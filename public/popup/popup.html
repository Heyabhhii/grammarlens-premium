<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrammarLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
    }
    .logo {
      width: 28px; height: 28px;
      background: #7c3aed;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 12px;
    }
    .title { font-weight: 600; font-size: 15px; }
    .body { padding: 16px; }
    #gl-status {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #f3f4f6;
      display: flex;
      justify-content: space-between;
    }
    a { color: #7c3aed; text-decoration: none; font-size: 12px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">GL</div>
    <span class="title">GrammarLens Premium</span>
  </div>
  <div class="body">
    <p id="gl-status">Loading…</p>
  </div>
  <div class="footer">
    <a href="#" id="gl-open-panel">Open Panel</a>
    <a href="#" id="gl-settings">Settings</a>
  </div>
  <script src="../../popup.js"></script>
</body>
</html>
